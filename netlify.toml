[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # js/supabase-config.js contiene a propósito la URL y la anon key de
  # Supabase (son públicas, pensadas para vivir en el navegador) — el
  # escáner de secretos de Netlify las marca como "filtradas" porque
  # coinciden con las env vars SUPABASE_URL/SUPABASE_ANON_KEY. La
  # service_role key nunca está en ese archivo, así que sigue vigilada.
  SECRETS_SCAN_OMIT_PATHS = "js/supabase-config.js"

[functions]
  node_bundler = "esbuild"

# Cabeceras defensivas para /admin/: no evitan que alguien acceda si conoce
# la URL (eso lo hace Supabase Auth adentro de cada Netlify Function), pero
# sí evitan que buscadores o proxies cacheen esas páginas.
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
