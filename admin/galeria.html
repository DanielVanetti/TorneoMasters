<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galería — Admin Torneo Máster</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body data-page="galeria">
  <header class="admin-header">
    <a class="brand" href="./dashboard.html">Admin · Torneo Máster</a>
    <nav>
      <a href="./dashboard.html" data-nav="dashboard">Inicio</a>
      <a href="./equipos.html" data-nav="equipos">Equipos</a>
      <a href="./jugadores.html" data-nav="jugadores">Jugadores</a>
      <a href="./partidos.html" data-nav="partidos">Partidos</a>
      <a href="./galeria.html" data-nav="galeria">Galería</a>
      <a href="./importar-excel.html" data-nav="importar">Importar</a>
    </nav>
    <button class="logout" id="btn-logout">Salir</button>
  </header>

  <main class="admin-main">
    <h1>Galería</h1>
    <p class="subtitle">Subí fotos de partidos y actividades, una por una.</p>

    <div class="panel">
      <h2>Subir foto</h2>
      <div id="mensaje" class="mensaje"></div>
      <form id="form-foto">
        <label for="foto">Foto</label>
        <input type="file" id="foto" accept="image/*" required>
        <label for="titulo">Título</label>
        <input type="text" id="titulo" placeholder="Ej: Jornada 3 - Sabaneros vs Costeños">
        <label for="descripcion">Descripción (opcional)</label>
        <textarea id="descripcion"></textarea>
        <label for="partido_id">Partido relacionado (opcional)</label>
        <select id="partido_id"><option value="">Ninguno / actividad general</option></select>
        <button type="submit" class="btn">Subir foto</button>
      </form>
    </div>

    <div class="panel">
      <h2>Fotos publicadas</h2>
      <div id="grid-fotos" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px">
        <p>Cargando…</p>
      </div>
    </div>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./js/admin-common.js"></script>
  <script src="./js/galeria.js"></script>
</body>
</html>
