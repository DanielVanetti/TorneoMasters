<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Partidos — Admin Torneo Máster</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body data-page="partidos">
  <header class="admin-header">
    <a class="brand" href="./dashboard.html">Admin · Torneo Máster</a>
    <nav>
      <a href="./dashboard.html" data-nav="dashboard">Inicio</a>
      <a href="./equipos.html" data-nav="equipos">Equipos</a>
      <a href="./jugadores.html" data-nav="jugadores">Jugadores</a>
      <a href="./partidos.html" data-nav="partidos">Partidos</a>
      <a href="./galeria.html" data-nav="galeria">Galería</a>
      <a href="./reglamento.html" data-nav="reglamento">Reglamento</a>
      <a href="./importar-excel.html" data-nav="importar">Importar</a>
    </nav>
    <button class="logout" id="btn-logout">Salir</button>
  </header>

  <main class="admin-main">
    <h1>Partidos</h1>
    <p class="subtitle">Programá partidos y cargá el resultado + informe del árbitro.</p>

    <div class="panel">
      <h2 id="form-titulo">Nuevo partido</h2>
      <div id="mensaje" class="mensaje"></div>
      <form id="form-partido">
        <input type="hidden" id="partido-id">
        <div class="form-row">
          <div>
            <label for="jornada">Jornada</label>
            <input type="number" id="jornada" min="1" required>
          </div>
          <div>
            <label for="estado">Estado</label>
            <select id="estado">
              <option>Programado</option>
              <option>Jugado</option>
              <option>Suspendido</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required>
          </div>
          <div>
            <label for="hora">Hora</label>
            <input type="time" id="hora">
          </div>
        </div>
        <label for="cancha">Cancha</label>
        <input type="text" id="cancha">

        <div class="form-row">
          <div>
            <label for="equipo_local_id">Equipo local</label>
            <select id="equipo_local_id" required><option value="">Cargando…</option></select>
          </div>
          <div>
            <label for="equipo_visitante_id">Equipo visitante</label>
            <select id="equipo_visitante_id" required><option value="">Cargando…</option></select>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="goles_local">Goles local</label>
            <input type="number" id="goles_local" min="0">
          </div>
          <div>
            <label for="goles_visitante">Goles visitante</label>
            <input type="number" id="goles_visitante" min="0">
          </div>
        </div>

        <label>Goleadores del partido</label>
        <div id="goles-filas"></div>
        <button type="button" class="btn small secondary" id="btn-agregar-gol">+ Agregar gol</button>

        <label for="arbitro_nombre">Árbitro</label>
        <input type="text" id="arbitro_nombre">
        <label for="informe_arbitro">Informe del árbitro</label>
        <textarea id="informe_arbitro" placeholder="Resumen del partido, observaciones, etc."></textarea>
        <label for="incidencias">Incidencias (tarjetas, expulsiones, otros)</label>
        <textarea id="incidencias"></textarea>

        <div style="display:flex;gap:10px">
          <button type="submit" class="btn">Guardar partido</button>
          <button type="button" class="btn secondary" id="btn-cancelar" style="display:none">Cancelar edición</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <h2>Partidos</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Jornada</th><th>Fecha</th><th>Partido</th><th>Marcador</th><th>Estado</th><th></th></tr></thead>
          <tbody id="tabla-partidos"><tr><td colspan="6">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./js/admin-common.js"></script>
  <script src="./js/partidos.js"></script>
</body>
</html>
