<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jugadores — Admin Torneo Máster</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body data-page="jugadores">
  <header class="admin-header">
    <a class="brand" href="./dashboard.html">Admin · Torneo Máster</a>
    <nav>
      <a href="./dashboard.html" data-nav="dashboard">Inicio</a>
      <a href="./equipos.html" data-nav="equipos">Equipos</a>
      <a href="./jugadores.html" data-nav="jugadores">Jugadores</a>
      <a href="./partidos.html" data-nav="partidos">Partidos</a>
      <a href="./galeria.html" data-nav="galeria">Galería</a>
      <a href="./reglamento.html" data-nav="reglamento">Reglamento</a>
      <a href="./importar-excel.html" data-nav="importar">Importar</a>
    </nav>
    <button class="logout" id="btn-logout">Salir</button>
  </header>

  <main class="admin-main">
    <h1>Jugadores</h1>
    <p class="subtitle">Agregá o editá jugadores de cada plantel.</p>

    <div class="panel">
      <h2 id="form-titulo">Nuevo jugador</h2>
      <div id="mensaje" class="mensaje"></div>
      <form id="form-jugador">
        <input type="hidden" id="jugador-id">
        <label for="equipo_id">Equipo</label>
        <select id="equipo_id" required><option value="">Cargando equipos…</option></select>

        <div class="form-row">
          <div>
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" required>
          </div>
          <div>
            <label for="numero">Número</label>
            <input type="number" id="numero" min="0" max="99">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label for="posicion">Posición</label>
            <select id="posicion">
              <option value="">—</option>
              <option>Portero</option>
              <option>Defensa</option>
              <option>Mediocampo</option>
              <option>Delantero</option>
            </select>
          </div>
          <div>
            <label for="fecha_nacimiento">Fecha de nacimiento</label>
            <input type="date" id="fecha_nacimiento">
          </div>
        </div>

        <label for="foto">Foto (opcional)</label>
        <input type="file" id="foto" accept="image/*">
        <img id="foto-preview" class="foto-preview" style="display:none">

        <div style="display:flex;gap:10px">
          <button type="submit" class="btn">Guardar jugador</button>
          <button type="button" class="btn secondary" id="btn-cancelar" style="display:none">Cancelar edición</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <h2>Jugadores existentes</h2>
      <label for="filtro-equipo" style="margin-top:0">Filtrar por equipo</label>
      <select id="filtro-equipo"><option value="">Todos los equipos</option></select>
      <div class="table-wrap" style="margin-top:16px">
        <table>
          <thead><tr><th>Jugador</th><th>Equipo</th><th>#</th><th>Posición</th><th></th></tr></thead>
          <tbody id="tabla-jugadores"><tr><td colspan="5">Cargando…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./js/admin-common.js"></script>
  <script src="./js/jugadores.js"></script>
</body>
</html>
