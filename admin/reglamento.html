<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reglamento — Admin Torneo Máster</title>
<link rel="stylesheet" href="./css/admin.css">
</head>
<body data-page="reglamento">
  <header class="admin-header">
    <a class="brand" href="./dashboard.html">Admin · Torneo Máster</a>
    <nav>
      <a href="./dashboard.html" data-nav="dashboard">Inicio</a>
      <a href="./equipos.html" data-nav="equipos">Equipos</a>
      <a href="./jugadores.html" data-nav="jugadores">Jugadores</a>
      <a href="./partidos.html" data-nav="partidos">Partidos</a>
      <a href="./galeria.html" data-nav="galeria">Galería</a>
      <a href="./reglamento.html" data-nav="reglamento">Reglamento</a>
      <a href="./importar-excel.html" data-nav="importar">Importar</a>
    </nav>
    <button class="logout" id="btn-logout">Salir</button>
  </header>

  <main class="admin-main">
    <h1>Reglamento</h1>
    <p class="subtitle">Este texto se publica tal cual en la página pública de Reglamento.</p>
    <div id="mensaje" class="mensaje"></div>

    <div class="panel">
      <h2>Requisitos para participar</h2>
      <label for="req-titulo">Título</label>
      <input type="text" id="req-titulo">
      <label for="req-contenido">Contenido</label>
      <textarea id="req-contenido" style="min-height:220px"></textarea>
      <button type="button" class="btn" id="btn-guardar-requisitos">Guardar requisitos</button>
    </div>

    <div class="panel">
      <h2>Reglamento del torneo</h2>
      <label for="reg-titulo">Título</label>
      <input type="text" id="reg-titulo">
      <label for="reg-contenido">Contenido</label>
      <textarea id="reg-contenido" style="min-height:280px"></textarea>
      <button type="button" class="btn" id="btn-guardar-reglamento">Guardar reglamento</button>
    </div>
  </main>

  <script src="../js/supabase-config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./js/admin-common.js"></script>
  <script src="./js/reglamento.js"></script>
</body>
</html>
