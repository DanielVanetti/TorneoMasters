<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#FAF3E9;font-family:'Barlow Semi Condensed',sans-serif}
@media (max-width:860px){
  .tms-head{padding:26px 24px !important}
  .tms-head h1{font-size:26px !important}
  .tms-section{padding:24px 20px 44px !important}
  .tms-galeria-grid{grid-template-columns:repeat(2,1fr) !important}
}
@media (max-width:600px){
  .tms-head{padding:20px 18px !important}
  .tms-head h1{font-size:21px !important}
  .tms-head p{font-size:14px !important;margin-left:0 !important}
  .tms-section{padding:18px 14px 36px !important}
  .tms-galeria-grid{grid-template-columns:1fr !important;gap:12px !important}
}
</style>
</helmet>
<dc-import name="Nav" current="galeria" hint-size="100%,76px"></dc-import>

<div class="tms-head" style="background:#0A4652;padding:36px 48px;">
  <div style="max-width:1240px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;"><div style="width:6px;height:30px;background:#F2C94C;border-radius:2px;"></div>
      <h1 style="font-family:'Anton',sans-serif;color:#FAF3E9;font-size:34px;margin:0;letter-spacing:0.5px;">GALERÍA</h1>
    </div>
    <p style="color:rgba(250,243,233,0.75);font-size:16px;margin:8px 0 0 18px;">Fotos de partidos y actividades del torneo</p>
  </div>
</div>

<div class="tms-section" style="max-width:1240px;margin:0 auto;padding:36px 48px 60px;">
  <sc-if value="{{ isEmpty }}">
    <div style="text-align:center;padding:60px 20px;color:rgba(36,27,20,0.5);font-size:16px;">Todavía no hay fotos publicadas. Volvé pronto.</div>
  </sc-if>
  <div class="tms-galeria-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">
    <sc-for list="{{ fotos }}" as="f" hint-placeholder-count="6">
      <div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,0.08);">
        <div style="width:100%;aspect-ratio:4/3;background:#e7ddc8;overflow:hidden;">
          <img src="{{ f.url }}" alt="{{ f.titulo }}" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>
        <sc-if value="{{ f.titulo }}">
          <div style="padding:12px 14px;">
            <div style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:14.5px;color:#241B14;">{{ f.titulo }}</div>
          </div>
        </sc-if>
      </div>
    </sc-for>
  </div>
</div>

<dc-import name="Footer" hint-size="100%,260px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { fotos: [] };

  async componentDidMount() {
    const db = await window.TorneoDBReady;
    const fotos = await db.getGaleria();
    this.setState({ fotos });
  }

  renderVals() {
    return { fotos: this.state.fotos, isEmpty: this.state.fotos.length === 0 };
  }
}

</script>
</body>
</html>
