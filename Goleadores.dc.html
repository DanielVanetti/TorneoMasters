<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#FAF3E9;font-family:'Barlow Semi Condensed',sans-serif}
@media (max-width:860px){
  .tms-head{padding:26px 24px !important}
  .tms-head h1{font-size:26px !important}
  .tms-section{padding:24px 20px 44px !important}
}
@media (max-width:600px){
  .tms-head{padding:20px 18px !important}
  .tms-head h1{font-size:21px !important}
  .tms-head p{font-size:14px !important;margin-left:0 !important}
  .tms-section{padding:18px 14px 36px !important}
  .tms-podium{grid-template-columns:1fr !important;gap:12px !important}
  .tms-table-wrap th,.tms-table-wrap td{padding:8px 6px !important;font-size:12.5px !important}
}
</style>
</helmet>
<dc-import name="Nav" current="goleadores" hint-size="100%,76px"></dc-import>

<div class="tms-head" style="background:#0A4652;padding:36px 48px;">
  <div style="max-width:1240px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;"><div style="width:6px;height:30px;background:#F2C94C;border-radius:2px;"></div>
      <h1 style="font-family:'Anton',sans-serif;color:#FAF3E9;font-size:34px;margin:0;letter-spacing:0.5px;">TABLA DE GOLEADORES</h1>
    </div>
    <p style="color:rgba(250,243,233,0.75);font-size:16px;margin:8px 0 0 18px;">Se actualiza automáticamente con cada gol registrado</p>
  </div>
</div>

<div class="tms-section" style="max-width:1240px;margin:0 auto;padding:36px 48px 60px;">
  <sc-if value="{{ hasData }}">
    <div class="tms-podium" style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:34px;">
      <sc-for list="{{ podium }}" as="p" hint-placeholder-count="3">
        <div style="background:{{ p.bg }};border-radius:10px;padding:24px 20px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,0.1);">
          <div style="font-family:'Anton',sans-serif;font-size:15px;color:{{ p.medalColor }};letter-spacing:1px;">{{ p.medalLabel }}</div>
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.25);margin:12px auto;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:11px;color:rgba(255,255,255,0.7);">FOTO</div>
          <div style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:18px;color:#fff;">{{ p.name }}</div>
          <div style="font-family:'Barlow Semi Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,0.8);margin-top:2px;">{{ p.team }}</div>
          <div style="font-family:'Anton',sans-serif;font-size:36px;color:#fff;margin-top:8px;">{{ p.goals }}<span style="font-size:14px;font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;"> goles</span></div>
        </div>
      </sc-for>
    </div>

    <div class="tms-table-wrap" style="overflow-x:auto;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,0.08);">
      <table style="width:100%;border-collapse:collapse;font-family:'Barlow Semi Condensed',sans-serif;background:#fff;">
        <thead>
          <tr style="background:#0E5C6B;color:#FAF3E9;">
            <th style="padding:12px 10px;text-align:left;font-size:13px;letter-spacing:1px;text-transform:uppercase;">#</th>
            <th style="padding:12px 10px;text-align:left;font-size:13px;letter-spacing:1px;text-transform:uppercase;">Jugador</th>
            <th style="padding:12px 10px;text-align:left;font-size:13px;letter-spacing:1px;text-transform:uppercase;">Equipo</th>
            <th style="padding:12px 10px;font-size:13px;letter-spacing:1px;text-transform:uppercase;">Goles</th>
          </tr>
        </thead>
        <tbody>
          <sc-for list="{{ scorers }}" as="s" hint-placeholder-count="12">
            <tr style="{{ s.rowStyle }}">
              <td style="padding:10px;font-family:'Anton',sans-serif;color:#8a7a68;font-size:15px;">{{ s.rank }}</td>
              <td style="padding:10px;font-weight:700;color:#241B14;font-size:15.5px;">{{ s.name }}</td>
              <td style="padding:10px;color:#3d3025;">{{ s.team }}</td>
              <td style="padding:10px;text-align:center;font-family:'Anton',sans-serif;font-size:17px;color:#0A4652;">{{ s.goals }}</td>
            </tr>
          </sc-for>
        </tbody>
      </table>
    </div>
  </sc-if>
  <sc-if value="{{ isEmpty }}">
    <div style="text-align:center;padding:60px 20px;color:rgba(36,27,20,0.5);font-size:16px;">Aún no hay goles registrados en el torneo.</div>
  </sc-if>
</div>

<dc-import name="Footer" hint-size="100%,260px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { scorers: [] };

  async componentDidMount() {
    const db = await window.TorneoDBReady;
    const scorers = await db.getGoleadores();
    this.setState({ scorers });
  }

  renderVals() {
    const list = this.state.scorers.map((s, i) => ({
      ...s,
      rank: i + 1,
      rowStyle: i % 2 === 1 ? "background:rgba(14,92,107,0.045);" : "background:#fff;",
    }));
    const medals = [
      { bg: "linear-gradient(135deg,#D9A62E,#C97B2E)", medalColor: "#3A2408", medalLabel: "1º LUGAR" },
      { bg: "linear-gradient(135deg,#8a97a3,#5c6b78)", medalColor: "#eee", medalLabel: "2º LUGAR" },
      { bg: "linear-gradient(135deg,#A6452B,#7a3220)", medalColor: "#f3ddd2", medalLabel: "3º LUGAR" },
    ];
    const podium = list.slice(0, 3).map((s, i) => ({ ...s, ...medals[i] }));
    return { scorers: list, podium, hasData: list.length > 0, isEmpty: list.length === 0 };
  }
}

</script>
</body>
</html>
