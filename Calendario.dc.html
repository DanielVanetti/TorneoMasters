<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#FAF3E9;font-family:'Barlow Semi Condensed',sans-serif}
@media (max-width:860px){
  .tms-head{padding:26px 24px !important}
  .tms-head h1{font-size:26px !important}
  .tms-section{padding:24px 20px 44px !important}
}
@media (max-width:600px){
  .tms-head{padding:20px 18px !important}
  .tms-head h1{font-size:21px !important}
  .tms-head p{font-size:14px !important;margin-left:0 !important}
  .tms-section{padding:18px 14px 36px !important}
  .tms-fixtures-grid{grid-template-columns:1fr !important}
}
</style>
</helmet>
<dc-import name="Nav" current="calendario" hint-size="100%,76px"></dc-import>

<div class="tms-head" style="background:#0A4652;padding:36px 48px;">
  <div style="max-width:1240px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;"><div style="width:6px;height:30px;background:#F2C94C;border-radius:2px;"></div>
      <h1 style="font-family:'Anton',sans-serif;color:#FAF3E9;font-size:34px;margin:0;letter-spacing:0.5px;">PRÓXIMA JORNADA</h1>
    </div>
    <p style="color:rgba(250,243,233,0.75);font-size:16px;margin:8px 0 0 18px;">Partidos programados, actualizados desde el panel admin</p>
  </div>
</div>

<div class="tms-section" style="max-width:1240px;margin:0 auto;padding:36px 48px 60px;">
  <sc-if value="{{ hasData }}">
    <div class="tms-fixtures-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:18px;">
      <sc-for list="{{ fixtures }}" as="m" hint-placeholder-count="8">
        <div style="background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.07);overflow:hidden;border-top:5px solid #C97B2E;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:rgba(14,92,107,0.06);">
            <span style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;color:#0A4652;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;">{{ m.date }}</span>
            <span style="font-family:'Anton',sans-serif;color:#C97B2E;font-size:16px;">{{ m.time }}</span>
          </div>
          <div style="padding:22px 18px;display:flex;align-items:center;justify-content:center;gap:18px;">
            <span style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:19px;color:#241B14;text-align:right;flex:1;">{{ m.home }}</span>
            <span style="font-family:'Anton',sans-serif;color:#8a7a68;font-size:14px;background:rgba(36,27,20,0.06);padding:4px 10px;border-radius:6px;">VS</span>
            <span style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:19px;color:#241B14;flex:1;">{{ m.away }}</span>
          </div>
          <div style="padding:10px 18px 16px;text-align:center;font-family:ui-monospace,monospace;font-size:12.5px;color:rgba(36,27,20,0.55);">{{ m.venue }}</div>
        </div>
      </sc-for>
    </div>
  </sc-if>
  <sc-if value="{{ isEmpty }}">
    <div style="text-align:center;padding:60px 20px;color:rgba(36,27,20,0.5);font-size:16px;">Aún no hay partidos programados. Volvé pronto.</div>
  </sc-if>
</div>

<dc-import name="Footer" hint-size="100%,260px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { fixtures: [] };

  async componentDidMount() {
    const db = await window.TorneoDBReady;
    const fixtures = await db.getProximosPartidos();
    this.setState({ fixtures });
  }

  renderVals() {
    const fixtures = this.state.fixtures;
    return { fixtures, hasData: fixtures.length > 0, isEmpty: fixtures.length === 0 };
  }
}

</script>
</body>
</html>
