<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#FAF3E9;font-family:'Barlow Semi Condensed',sans-serif}
@media (max-width:860px){
  .tms-head{padding:26px 24px !important}
  .tms-head h1{font-size:26px !important}
  .tms-section{padding:24px 20px 44px !important}
}
@media (max-width:600px){
  .tms-head{padding:20px 18px !important}
  .tms-head h1{font-size:21px !important}
  .tms-head p{font-size:14px !important;margin-left:0 !important}
  .tms-section{padding:18px 14px 36px !important}
}
</style>
</helmet>
<dc-import name="Nav" current="reglamento" hint-size="100%,76px"></dc-import>

<div class="tms-head" style="background:#0A4652;padding:36px 48px;">
  <div style="max-width:1240px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;"><div style="width:6px;height:30px;background:#F2C94C;border-radius:2px;"></div>
      <h1 style="font-family:'Anton',sans-serif;color:#FAF3E9;font-size:34px;margin:0;letter-spacing:0.5px;">REGLAMENTO</h1>
    </div>
    <p style="color:rgba(250,243,233,0.75);font-size:16px;margin:8px 0 0 18px;">Requisitos para participar y reglamento oficial del torneo</p>
  </div>
</div>

<div class="tms-section" style="max-width:900px;margin:0 auto;padding:36px 48px 60px;">
  <div style="background:#fff;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,0.06);padding:28px 32px;margin-bottom:24px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="width:6px;height:24px;background:#C97B2E;border-radius:2px;"></div><h2 style="font-family:'Anton',sans-serif;color:#0A4652;font-size:22px;margin:0;">{{ requisitosTitulo }}</h2></div>
    <sc-if value="{{ hasRequisitos }}">
      <p style="white-space:pre-wrap;font-size:15.5px;line-height:1.7;color:#3d3025;margin:0;">{{ requisitosContenido }}</p>
    </sc-if>
    <sc-if value="{{ noRequisitos }}">
      <p style="color:rgba(36,27,20,0.45);font-size:15px;margin:0;">Esta sección se publicará pronto.</p>
    </sc-if>
  </div>

  <div style="background:#fff;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,0.06);padding:28px 32px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="width:6px;height:24px;background:#F2C94C;border-radius:2px;"></div><h2 style="font-family:'Anton',sans-serif;color:#0A4652;font-size:22px;margin:0;">{{ reglamentoTitulo }}</h2></div>
    <sc-if value="{{ hasReglamento }}">
      <p style="white-space:pre-wrap;font-size:15.5px;line-height:1.7;color:#3d3025;margin:0;">{{ reglamentoContenido }}</p>
    </sc-if>
    <sc-if value="{{ noReglamento }}">
      <p style="color:rgba(36,27,20,0.45);font-size:15px;margin:0;">Esta sección se publicará pronto.</p>
    </sc-if>
  </div>
</div>

<dc-import name="Footer" hint-size="100%,260px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { requisitos: null, reglamento: null };

  async componentDidMount() {
    const db = await window.TorneoDBReady;
    const { requisitos, reglamento } = await db.getContenido();
    this.setState({ requisitos, reglamento });
  }

  renderVals() {
    const r = this.state.requisitos;
    const g = this.state.reglamento;
    const rTexto = r && r.contenido ? r.contenido.trim() : "";
    const gTexto = g && g.contenido ? g.contenido.trim() : "";
    return {
      requisitosTitulo: (r && r.titulo) || "Requisitos para participar",
      requisitosContenido: rTexto,
      hasRequisitos: rTexto.length > 0,
      noRequisitos: rTexto.length === 0,
      reglamentoTitulo: (g && g.titulo) || "Reglamento del torneo",
      reglamentoContenido: gTexto,
      hasReglamento: gTexto.length > 0,
      noReglamento: gTexto.length === 0,
    };
  }
}

</script>
</body>
</html>
