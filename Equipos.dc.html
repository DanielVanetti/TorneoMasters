<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#FAF3E9;font-family:'Barlow Semi Condensed',sans-serif}
@media (max-width:860px){
  .tms-head{padding:26px 24px !important}
  .tms-head h1{font-size:26px !important}
  .tms-section{padding:24px 20px 44px !important}
  .tms-teams-grid{grid-template-columns:repeat(3,1fr) !important}
  .tms-roster-grid{grid-template-columns:repeat(3,1fr) !important}
  .tms-roster-grid>div{border-right:none !important;border-bottom:1px solid rgba(36,27,20,0.06) !important}
}
@media (max-width:600px){
  .tms-head{padding:20px 18px !important}
  .tms-head h1{font-size:21px !important}
  .tms-head p{font-size:14px !important;margin-left:0 !important}
  .tms-section{padding:18px 14px 36px !important}
  .tms-teams-grid{grid-template-columns:repeat(2,1fr) !important;gap:12px !important}
  .tms-roster-grid{grid-template-columns:repeat(2,1fr) !important}
  .tms-roster-header{flex-wrap:wrap !important;gap:8px !important}
  .tms-roster-header>span:last-child{margin-left:0 !important}
}
</style>
</helmet>
<dc-import name="Nav" current="equipos" hint-size="100%,76px"></dc-import>

<div class="tms-head" style="background:#0A4652;padding:36px 48px;">
  <div style="max-width:1240px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;"><div style="width:6px;height:30px;background:#F2C94C;border-radius:2px;"></div>
      <h1 style="font-family:'Anton',sans-serif;color:#FAF3E9;font-size:34px;margin:0;letter-spacing:0.5px;">EQUIPOS</h1>
    </div>
    <p style="color:rgba(250,243,233,0.75);font-size:16px;margin:8px 0 0 18px;">16 equipos · haz clic en un equipo para ver su plantel</p>
  </div>
</div>

<div class="tms-section" style="max-width:1240px;margin:0 auto;padding:36px 48px 60px;">
  <div class="tms-teams-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:40px;">
    <sc-for list="{{ teams }}" as="t" hint-placeholder-count="16">
      <a href="{{ t.anchor }}" style="text-decoration:none;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,0.07);display:block;">
        <div style="height:6px;background:{{ t.color }};"></div>
        <div style="padding:18px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;">
          <div style="width:56px;height:56px;border-radius:50%;background:{{ t.color }};display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;color:#fff;font-size:16px;">{{ t.initials }}</div>
          <div style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:16px;color:#241B14;line-height:1.2;">{{ t.name }}</div>
          <div style="font-size:12.5px;color:rgba(36,27,20,0.5);font-family:ui-monospace,monospace;">{{ t.city }}</div>
          <div style="font-family:'Anton',sans-serif;color:#0A4652;font-size:14px;">#{{ t.rank }} · {{ t.pts }} pts</div>
        </div>
      </a>
    </sc-for>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;"><div style="width:6px;height:24px;background:#C97B2E;border-radius:2px;"></div><h2 style="font-family:'Anton',sans-serif;color:#0A4652;font-size:26px;margin:0;">PLANTELES</h2></div>

  <div style="display:flex;flex-direction:column;gap:22px;">
    <sc-for list="{{ rosterGroups }}" as="g" hint-placeholder-count="16">
      <div id="{{ g.id }}" style="scroll-margin-top:90px;background:#fff;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,0.06);overflow:hidden;">
        <div class="tms-roster-header" style="display:flex;align-items:center;gap:12px;padding:14px 20px;background:{{ g.color }};">
          <span style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;color:#fff;font-size:13px;">{{ g.initials }}</span>
          <span style="font-family:'Anton',sans-serif;color:#fff;font-size:19px;letter-spacing:0.5px;">{{ g.name }}</span>
          <span style="margin-left:auto;font-family:'Barlow Semi Condensed',sans-serif;color:rgba(255,255,255,0.85);font-size:13px;">{{ g.city }}</span>
        </div>
        <div class="tms-roster-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;">
          <sc-for list="{{ g.players }}" as="p" hint-placeholder-count="5">
            <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:18px 10px;border-right:1px solid rgba(36,27,20,0.06);">
              <div style="width:52px;height:52px;border-radius:50%;background:repeating-linear-gradient(45deg,#e7ddc8,#e7ddc8 5px,#ddd0b3 5px,#ddd0b3 10px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:9px;color:rgba(36,27,20,0.45);">FOTO</div>
              <div style="font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:14px;color:#241B14;">{{ p.name }}</div>
              <div style="display:flex;gap:6px;align-items:center;">
                <span style="font-family:'Anton',sans-serif;font-size:15px;color:#C97B2E;">#{{ p.number }}</span>
                <span style="font-size:11.5px;color:rgba(36,27,20,0.55);text-transform:uppercase;letter-spacing:0.5px;">{{ p.position }}</span>
              </div>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>

<dc-import name="Footer" hint-size="100%,260px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { teams: [], players: [] };

  async componentDidMount() {
    const db = await window.TorneoDBReady;
    const [teams, players] = await Promise.all([db.getPosiciones(), db.getJugadores()]);
    this.setState({ teams, players });
  }

  initials(name) {
    return name.split(" ").filter(w => w.length > 2 || /^[A-Z0-9]/.test(w)).slice(0, 2).map(w => w[0]).join("").toUpperCase().slice(0, 3);
  }

  renderVals() {
    const teams = this.state.teams.map((t, i) => ({
      ...t,
      rank: i + 1,
      initials: this.initials(t.name),
      anchor: `#roster-${t.id}`,
    }));
    const rosterGroups = teams.map(t => ({
      ...t,
      id: `roster-${t.id}`,
      players: this.state.players.filter(p => p.team === t.id),
    }));
    return { teams, rosterGroups };
  }
}

</script>
</body>
</html>
