<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="./js/supabase-client.js"></script>
<style>
@media (max-width:700px){
  .tms-nav-inner{padding:10px 16px !important;gap:10px !important}
  .tms-nav-brand-sub{font-size:11px !important;letter-spacing:1px !important}
  .tms-nav-links{margin-left:0 !important;width:100% !important;flex-wrap:nowrap !important;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .tms-nav-links a{padding:8px 12px !important;font-size:12.5px !important}
}
@media (max-width:420px){
  .tms-nav-logo{width:40px !important;height:40px !important;font-size:16px !important}
  .tms-nav-brand-main{font-size:18px !important}
}
</style>
</helmet>
<header style="--teal:#0E5C6B;--teal-dark:#0A4652;--gold:#F2C94C;--orange:#C97B2E;--bg:#FAF3E9;position:sticky;top:0;z-index:50;background:var(--teal-dark);border-bottom:4px solid var(--gold);box-shadow:0 4px 14px rgba(0,0,0,0.18);">
  <div class="tms-nav-inner" style="max-width:1240px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;">
    <a href="./Inicio.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;">
      <div class="tms-nav-logo" style="width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #ffe9ad, var(--gold) 45%, var(--orange) 100%);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:20px;color:#3a2408;box-shadow:inset 0 -3px 0 rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.35);flex-shrink:0;">TMS</div>
      <div style="display:flex;flex-direction:column;line-height:1;">
        <span class="tms-nav-brand-main" style="font-family:'Anton',sans-serif;color:var(--bg);font-size:22px;letter-spacing:0.5px;">TORNEO MÁSTER</span>
        <span class="tms-nav-brand-sub" style="font-family:'Barlow Semi Condensed',sans-serif;color:var(--gold);font-size:13px;font-weight:700;letter-spacing:2px;">SANTA CRUZ · GUANACASTE</span>
      </div>
    </a>
    <nav class="tms-nav-links" style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;font-family:'Barlow Semi Condensed',sans-serif;">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="6">
        <a href="{{ item.href }}" style="{{ item.style }}">{{ item.label }}</a>
      </sc-for>
    </nav>
  </div>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:76},&quot;current&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;inicio&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;posiciones&quot;,&quot;goleadores&quot;,&quot;calendario&quot;,&quot;equipos&quot;,&quot;galeria&quot;,&quot;finanzas&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const current = this.props.current || "inicio";
    const base = {
      padding: "10px 14px",
      borderRadius: "6px",
      textDecoration: "none",
      fontWeight: 700,
      fontSize: "14px",
      letterSpacing: "0.5px",
      textTransform: "uppercase",
      color: "#FAF3E9",
      whiteSpace: "nowrap",
    };
    const styleFor = (key) => {
      const active = key === current;
      const s = { ...base };
      if (active) {
        s.background = "#F2C94C";
        s.color = "#3A2408";
      }
      return Object.entries(s).map(([k, v]) => `${k.replace(/[A-Z]/g, m => "-" + m.toLowerCase())}:${v}`).join(";");
    };
    const items = [
      { key: "inicio", label: "Inicio", href: "./Inicio.dc.html" },
      { key: "posiciones", label: "Posiciones", href: "./Posiciones.dc.html" },
      { key: "goleadores", label: "Goleadores", href: "./Goleadores.dc.html" },
      { key: "calendario", label: "Calendario", href: "./Calendario.dc.html" },
      { key: "equipos", label: "Equipos", href: "./Equipos.dc.html" },
      { key: "galeria", label: "Galería", href: "./Galeria.dc.html" },
      { key: "finanzas", label: "Finanzas", href: "./Finanzas.dc.html" },
    ].map(it => ({ ...it, style: styleFor(it.key) }));
    return { navItems: items };
  }
}

</script>
</body>
</html>
